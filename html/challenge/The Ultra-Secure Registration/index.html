<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultra-Secure Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#" method="post">
        
        <div>
            <label for="main-label">Username:</label>
            <input type="text" required minlength="5" maxlength="12">
        </div>

        <div>
            <label for="main-label">Password</label>
            <input type="password" required autocomplete="new-password" minlength="8">
        </div>

        <div>
            <label for="main-label">Umur</label>
            <input type="number" min="18" max="99" value="18">
        </div>
        <div>
            <label for="main-label">Kode Rahasia</label>
            <input type="text" readonly value="secure-2026">
        </div>
        <div>
            <label for="main-label">Email Pemulihan</label>
            <input type="email" multiple>
        </div>
        <div>
            <label for="main-label">Unggah CV</label>
            <input type="file" accept=".pdf, image/*">
        </div>
        <div><label for="main-label">Pilihan Paket</label><input type="radio" checked </div>
        <div><label for="main-label</label><input type="text"></div>

    </form>
</body>
</html>
