<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dev Progress Table</title>
    <link rel="stylesheet" href="style.css">n
</head>
<body>
    <table>
        <caption>Progress Pengembangan AVA</caption>
        <thead>
            <tr>
                <th scope="col">Modul</th>
                <th scope="col">Fitur</th>
                <th scope="col">Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Memory Manager</td>
                <td>Allocattor</td>
                <td>Selesai</td>
            </tr>
            <tr>
                <td>Garbage Collection</td>
                <td>Proses</td>
            </tr>
        </tbody>
        <tfoot">
            <tr>
                <td colspan="3">Total Progress: 60%</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
